<!DOCTYPE html>
<html class="app ">
<header class="header">
    <app-navbar></app-navbar>
</header>

<body class="body">
    <div class="container">
        <div class="filter">
            <app-filter></app-filter>
        </div>
        <div class="shop-container">
            <div class="shop-title">SNEAKERS SHOP</div>
            <div class="sort-header">
                <div *ngIf="items$ | async as shoes">( {{shoes.length}} ) sneakers</div>
                <div class="sort-by">
                    <div>Sort by</div>
                    <mat-select class="select" [ngModel]="sortBy$ | async" (ngModelChange)="sortBy$.next($event)">
                        <mat-option class="select-option" [value]="'rating'">rating</mat-option>
                        <mat-option class="select-option" [value]="'from-highest'" class="select">price: from
                            highest</mat-option>
                        <mat-option class="select-option" [value]="'from-lowest'" class="select">price: from
                            lowest</mat-option>
                    </mat-select>
                </div>
            </div>
            <ng-template #chosenFilter let-text="text" let-filterName="filterName">
                <div class="filter-by-option ">
                    <div class="option-data"> {{text}}</div>
                    <mat-icon (click)="close(filterName)" class="close-icon userName" data-mat-icon-type="svg">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z">
                            </path>
                        </svg>
                    </mat-icon>
                </div>
            </ng-template>
            <div class="selected-filters" *ngIf="currFilters$ | async as filter">
                <ng-container>
                    <ng-container *ngIf="filter.size">
                        <ng-container
                            *ngTemplateOutlet="chosenFilter; context:{text: 'Size: ' + filter.size, filterName:'size'}"></ng-container>
                    </ng-container>
                    <ng-container>
                        <ng-container
                            *ngTemplateOutlet="chosenFilter; context:{text: 'brand: ' + (filter.brands ? filter.brands : 'all'), filterName:'brands'}"></ng-container>
                    </ng-container>
                    <ng-container>
                        <ng-container
                            *ngTemplateOutlet="chosenFilter; context:{text: 'price: $' + filter.minPrice + ' - $' + filter.maxPrice, filterName:'price'}"></ng-container>
                    </ng-container>
                </ng-container>
                <div *ngIf="filter.brands || filter.size || filter.minPrice != 0 || filter.maxPrice != 200"
                    class="clear-all" (click)="close('all')">clear all</div>
            </div>
            <div class="shoe-display">
                <div class="card" *ngFor="let item of displayedCards$ | async; trackBy: trackById">
                    <app-shoe-card [currShoe]="item" [isInMainPage]="false"></app-shoe-card>
                </div>
            </div>
            <div class="view-control" *ngIf="sorted$ | async as displayedOptions">
                <div *ngIf="displayedOptions.length > visibleCards$.value" class="view-more" (click)="viewMore()">View
                    more</div>
                <div *ngIf="visibleCards$.value > 12" class="view-more" (click)="viewLess()">View less</div>
            </div>
        </div>
    </div>`
</body>

</html>
